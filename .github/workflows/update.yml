name: Update Instagram Feed

permissions:
  contents: write

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Commit & push index.html
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add index.html

          git commit -m "update instagram feed $(date -u)" || true

          git push origin main
