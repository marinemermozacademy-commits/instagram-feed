name: Update Instagram Feed

permissions:
  contents: write

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 🔥 TEST : on force un changement visible
      - name: Generate test index.html
        run: |
          echo "<!-- updated $(date -u) -->" > index.html
          echo "<h1>TEST $(date -u)</h1>" >> index.html
          cat index.html

      # 🔍 DEBUG pour comprendre l’état Git
      - name: Git status debug
        run: |
          git status
          git diff

      # 🚀 commit + push SANS logique cachée
      - name: Commit & push index.html
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add index.html

          git commit -m "update instagram feed $(date -u)" || echo "no changes to commit"

          git push origin main
